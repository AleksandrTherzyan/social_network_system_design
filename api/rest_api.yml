openapi: 3.0.3
info:
  title: Travel Social Network REST API
  version: 1.0.0
  description: REST API для функциональных требований социальной сети путешественников.

servers:
  - url: https://api.travel-social.example.com/v1

tags:
  - name: Photos
    description: Загрузка и удаление фотографий для сущностей
  - name: Posts
    description: Посты путешественников
  - name: Post reactions
    description: Лайки и комментарии к постам
  - name: Subscriptions
    description: Подписки на путешественников
  - name: Places
    description: Популярные места и посты по местам
  - name: Feeds
    description: Ленты в обратном хронологическом порядке
  - name: Excursions
    description: Каталог экскурсий, рейтинг, комментарии и покупка

paths:
  /photos/{type}:
    post:
      tags:
        - Photos
      summary: Загрузить фотографию
      description: Загружает фотографию для указанного типа сущности. Например, posts или excursions.
      parameters:
        - $ref: '#/components/parameters/PhotoType'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - authorId
                - photo
              properties:
                authorId:
                  type: integer
                  example: 1001
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Фотография загружена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Photo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /photos/{type}/{photoId}:
    delete:
      tags:
        - Photos
      summary: Удалить фотографию
      parameters:
        - $ref: '#/components/parameters/PhotoType'
        - $ref: '#/components/parameters/PhotoId'
      responses:
        '204':
          description: Фотография удалена
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts:
    get:
      tags:
        - Posts
      summary: Получить посты
      description: Возвращает посты в обратном хронологическом порядке с возможностью фильтрации по месту.
      parameters:
        - name: placeId
          in: query
          required: false
          description: Фильтр по месту путешествия.
          schema:
            type: integer
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Посты в обратном хронологическом порядке
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Posts
      summary: Опубликовать пост из путешествия
      description: Создает пост с ранее загруженными фотографиями, небольшим описанием и привязкой к месту путешествия.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Пост создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/{postId}:
    get:
      tags:
        - Posts
      summary: Получить пост
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Пост найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Posts
      summary: Отредактировать пост
      description: Обновляет описание, заголовок, место или список ранее загруженных фотографий поста.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
      responses:
        '200':
          description: Пост обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Posts
      summary: Удалить пост
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Пост удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/{postId}/likes/{userId}:
    post:
      tags:
        - Post reactions
      summary: Поставить лайк посту
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Лайк поставлен
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Post reactions
      summary: Удалить лайк с поста
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Лайк удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/{postId}/comments:
    get:
      tags:
        - Post reactions
      summary: Получить комментарии к посту
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Список комментариев к посту
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/PostComment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Post reactions
      summary: Добавить комментарий к посту
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /posts/{postId}/comments/{commentId}:
    delete:
      tags:
        - Post reactions
      summary: Удалить комментарий к посту
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204':
          description: Комментарий удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /travelers/{travelerId}/subscriptions/{targetTravelerId}:
    post:
      tags:
        - Subscriptions
      summary: Подписаться на путешественника
      parameters:
        - name: travelerId
          in: path
          required: true
          description: Идентификатор подписчика.
          schema:
            type: integer
        - name: targetTravelerId
          in: path
          required: true
          description: Идентификатор путешественника, на которого оформляется подписка.
          schema:
            type: integer
      responses:
        '204':
          description: Подписка создана
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Subscriptions
      summary: Отписаться от путешественника
      parameters:
        - name: travelerId
          in: path
          required: true
          description: Идентификатор подписчика.
          schema:
            type: integer
        - name: targetTravelerId
          in: path
          required: true
          description: Идентификатор путешественника, от которого выполняется отписка.
          schema:
            type: integer
      responses:
        '204':
          description: Подписка удалена
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /places:
    get:
      tags:
        - Places
      summary: Найти популярные места для путешествий
      parameters:
        - name: query
          in: query
          required: false
          description: Строка поиска по названию, стране или описанию места.
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Популярные места
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Place'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /travelers/{travelerId}/feed:
    get:
      tags:
        - Feeds
      summary: Посмотреть ленту
      description: Возвращает посты путешественника или посты по его подпискам в обратном хронологическом порядке.
      parameters:
        - name: travelerId
          in: path
          required: true
          schema:
            type: integer
        - name: feedType
          in: query
          required: false
          description: Тип ленты.
          schema:
            type: string
            enum:
              - traveler
              - subscriptions
            default: traveler
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Лента в обратном хронологическом порядке
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /excursions:
    get:
      tags:
        - Excursions
      summary: Найти экскурсии и посмотреть каталог по направлениям
      parameters:
        - name: query
          in: query
          required: false
          description: Строка поиска по названию или описанию экскурсии.
          schema:
            type: string
        - name: placeId
          in: query
          required: false
          description: Фильтр по направлению или месту.
          schema:
            type: integer
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Каталог экскурсий
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Excursion'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Excursions
      summary: Создать экскурсию
      description: Создает экскурсию по направлению с ранее загруженными фотографиями.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExcursionRequest'
      responses:
        '201':
          description: Экскурсия создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Excursion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /excursions/{excursionId}:
    get:
      tags:
        - Excursions
      summary: Получить экскурсию
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
      responses:
        '200':
          description: Экскурсия найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Excursion'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Excursions
      summary: Отредактировать экскурсию
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExcursionRequest'
      responses:
        '200':
          description: Экскурсия обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Excursion'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Excursions
      summary: Удалить экскурсию
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
      responses:
        '204':
          description: Экскурсия удалена
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /excursions/{excursionId}/comments:
    get:
      tags:
        - Excursions
      summary: Получить комментарии к экскурсии
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Комментарии к экскурсии
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CursorPage'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExcursionComment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Excursions
      summary: Добавить комментарий к экскурсии
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExcursionComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /excursions/{excursionId}/comments/{commentId}:
    delete:
      tags:
        - Excursions
      summary: Удалить комментарий к экскурсии
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204':
          description: Комментарий удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /excursions/{excursionId}/ratings:
    post:
      tags:
        - Excursions
      summary: Оценить экскурсию
      parameters:
        - $ref: '#/components/parameters/ExcursionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - rating
              properties:
                userId:
                  type: integer
                  example: 1001
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
      responses:
        '200':
          description: Рейтинг обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Excursion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    PostId:
      name: postId
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: integer
    PhotoType:
      name: type
      in: path
      required: true
      description: Тип сущности, для которой загружается фотография.
      schema:
        type: string
        enum:
          - posts
          - excursions
          - comments
    PhotoId:
      name: photoId
      in: path
      required: true
      schema:
        type: integer
    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: integer
    ExcursionId:
      name: excursionId
      in: path
      required: true
      schema:
        type: integer
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      description: Курсор для постраничной загрузки.
      schema:
        type: integer

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    CreatePostRequest:
      type: object
      required:
        - authorId
        - placeId
        - description
        - photoIds
      properties:
        authorId:
          type: integer
          example: 1001
        placeId:
          type: integer
          example: 501
        title:
          type: string
          maxLength: 64
          example: Закат в горах
        description:
          type: string
          maxLength: 256
          example: Небольшая прогулка по ущелью и вид на закат.
        photoIds:
          type: array
          minItems: 1
          items:
            type: integer
          example:
            - 7001
            - 7002

    UpdatePostRequest:
      type: object
      properties:
        placeId:
          type: integer
          example: 501
        title:
          type: string
          maxLength: 64
          example: Закат в горах
        description:
          type: string
          maxLength: 256
          example: Небольшая прогулка по ущелью и вид на закат.
        photoIds:
          type: array
          minItems: 1
          items:
            type: integer
          example:
            - 7001
            - 7002

    CursorPage:
      type: object
      required:
        - items
        - nextCursor
      properties:
        items:
          type: array
          items: { }
        nextCursor:
          type: integer
          nullable: true
          example: 3001

    Post:
      type: object
      required:
        - id
        - authorId
        - placeId
        - description
        - photos
        - status
        - likesCount
        - commentsCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 3001
        authorId:
          type: integer
          example: 1001
        placeId:
          type: integer
          example: 501
        title:
          type: string
          maxLength: 64
          example: Закат в горах
        description:
          type: string
          maxLength: 256
          example: Небольшая прогулка по ущелью и вид на закат.
        photos:
          type: array
          items:
            $ref: '#/components/schemas/Photo'
        status:
          $ref: '#/components/schemas/ModerationStatus'
        likesCount:
          type: integer
          minimum: 0
          example: 42
        commentsCount:
          type: integer
          minimum: 0
          example: 7
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Photo:
      type: object
      required:
        - id
        - url
      properties:
        id:
          type: integer
          example: 7001
        url:
          type: string
          format: uri
          example: https://cdn.travel-social.example.com/photos/7001.jpg

    PostComment:
      type: object
      required:
        - id
        - postId
        - authorId
        - text
        - status
        - createdAt
      properties:
        id:
          type: integer
          example: 4001
        postId:
          type: integer
          example: 3001
        authorId:
          type: integer
          example: 1002
        text:
          type: string
          maxLength: 200
          example: Очень красивое место!
        status:
          $ref: '#/components/schemas/ModerationStatus'
        createdAt:
          type: string
          format: date-time
    CreateCommentRequest:
      type: object
      required:
        - authorId
        - text
      properties:
        authorId:
          type: integer
          example: 1002
        text:
          type: string
          maxLength: 200
          example: Очень красивое место!
    Place:
      type: object
      required:
        - id
        - name
        - country
        - description
        - postsCount
        - createdAt
      properties:
        id:
          type: integer
          example: 501
        name:
          type: string
          maxLength: 64
          example: Чарынский каньон
        country:
